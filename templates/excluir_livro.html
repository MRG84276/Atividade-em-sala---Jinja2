{% extends 'base.html' %}

{% block titulo %}
    <h1>Deletar livro</h1>
{% endblock %}

{% block conteudo %}

<h2>Preencha para deletar o livro requisitado</h2>
<form action="/biblioteca/excluir" method="POST">
<div class="col-sm-8">
    <form method="POST" action="{{ url_for(excluir_livro', isbn=livro['isbn']) }}"></form>
        <input type="hidden" name="acao" value="cadastrar">
        <table class="table table-dark table-hover" style="max-width: 600px;">
          <tbody>
            <tr>
              <td style="width: 30%; vertical-align: middle;"><label for="isbn">ISBN:</label></td>
              <td><input type="text" id="isbn" name="isbn" class="form-control" required></td>
            </tr>    
            <tr>
              <td style="vertical-align: middle;"><label for="titulo">Título:</label></td>
              <td><input type="text" id="titulo" name="titulo" class="form-control" required></td>
            </tr>
            <tr>
              <td style="vertical-align: middle;"><label for="autor">Autor:</label></td>
              <td><input type="text" id="autor" name="autor" class="form-control" required></td>
            </tr>  
            <tr>
              <td style="vertical-align: middle;"><label for="genero">Gênero:</label></td>  
              <td><input type="text" id="genero" name="genero" class="form-control" required></td>
            </tr>
            <tr>
              <td style="vertical-align: middle;"><label for="ano">Ano Publicação:</label></td>  
              <td><input type="text" id="ano" name="ano" class="form-control" required></td>
            </tr>
            <tr>
              <td style="vertical-align: middle;"><label for="editora">Editora:</label></td>
              <td><input type="text" id="editora" name="editora" class="form-control" required></td>
            </tr>
            <tr>
              <td style="vertical-align: middle;"><label for="paginas">Páginas:</label></td>
              <td><input type="text" id="paginas" name="paginas" class="form-control" required></td>
            </tr>
            <tr> 
              <td style="vertical-align: middle;"><label for="status">Status:</label></td> 
              <td><input type="text" id="status" name="status" class="form-control" required></td>
            </tr>   
            <tr> 
              <td style="vertical-align: middle;"><label for="localizacao">Localizacao:</label></td> 
              <td><input type="text" id="localizacao" name="localizacao" class="form-control" required></td>
            </tr>     
         
              <td style="text-align: center;">
                <button type="submit">Deletar Livro</button>
              </td>
        
          </tbody>
        </table>
      </form>
</div>
{% endblock %}
